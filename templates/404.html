<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Link Lost in Space | TinyPath</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #0b0f19;
            --purple-glow: rgba(139, 92, 246, 0.15);
            --indigo-glow: rgba(99, 102, 241, 0.2);
            --neon-violet: #8b5cf6;
            --neon-indigo: #6366f1;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Space Background Glows */
        .ambient-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .glow-1 {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--indigo-glow) 0%, rgba(99, 102, 241, 0) 70%);
            top: -100px;
            left: -100px;
            filter: blur(40px);
        }

        .glow-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--purple-glow) 0%, rgba(139, 92, 246, 0) 70%);
            bottom: -150px;
            right: -150px;
            filter: blur(50px);
        }

        /* 404 Glass Card */
        .error-card {
            position: relative;
            z-index: 10;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 3rem 2rem;
            width: 90%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(99, 102, 241, 0.1);
            animation: float 6s ease-in-out infinite, fadeIn 0.8s ease-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .astronaut-icon {
            font-size: 5rem;
            background: linear-gradient(135deg, var(--neon-indigo), var(--neon-violet));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.4));
            animation: spinSlow 20s linear infinite;
        }

        @keyframes spinSlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-muted);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .code-highlight {
            display: inline-block;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: #a5b4fc;
            padding: 0.15rem 0.6rem;
            border-radius: 6px;
            font-family: monospace;
            font-weight: bold;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, var(--neon-indigo), var(--neon-violet));
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            font-weight: 600;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(99, 102, 241, 0.5),
                        0 0 20px rgba(139, 92, 246, 0.4);
        }

        .home-btn:active {
            transform: translateY(0);
        }

        .home-btn i {
            transition: transform 0.3s ease;
        }

        .home-btn:hover i {
            transform: translateX(-4px);
        }
    </style>
</head>
<body>

    <!-- Ambient Space Background Glows -->
    <div class="ambient-bg">
        <div class="glow-1"></div>
        <div class="glow-2"></div>
    </div>

    <!-- 404 Glass Card -->
    <div class="error-card">
        <div class="astronaut-icon">
            <i class="fa-solid fa-user-astronaut"></i>
        </div>
        <h1>Link Lost in Space</h1>
        <p>
            The requested short code <span class="code-highlight">{{ code }}</span> does not map to any active link. It might have expired or never existed in our coordinate grid.
        </p>
        <a href="/" class="home-btn">
            <i class="fa-solid fa-arrow-left"></i> Return to Station
        </a>
    </div>

</body>
</html>
